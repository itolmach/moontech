
<style>
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab { padding: 7px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 13px; font-weight: 400; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .tab:hover { background: var(--color-background-secondary); }
  .tab.active { font-weight: 500; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .bar-label { font-size: 12px; color: var(--color-text-secondary); min-width: 96px; text-align: right; }
  .bar-track { flex: 1; height: 20px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .bar-pct { font-size: 12px; font-weight: 500; min-width: 34px; }
  .persona-meta { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .meta-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 16px; flex: 1; min-width: 120px; }
  .meta-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
  .meta-val { font-size: 20px; font-weight: 500; }
  .sort-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1.25rem; font-size: 12px; color: var(--color-text-secondary); }
  .sort-btn { padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 12px; cursor: pointer; color: var(--color-text-secondary); }
  .sort-btn.active { font-weight: 500; }
  .top-adjectives { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .top-adjectives-label { font-size: 12px; color: var(--color-text-secondary); margin-right: 4px; }
  .top-adj-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 0.5px solid transparent; }
  .layout-wrapper { display: flex; gap: 40px; align-items: flex-start; max-width: 1000px; margin: 0 auto; justify-content: center; left: 0; right: 0; position: relative; }
  .data-column { flex: 1; min-width: 0; max-width: 500px; }
  .phone-column { flex-shrink: 0; position: sticky; top: 2rem; }
  .iphone-frame { width: 320px; height: 693px; border: 14px solid #111; border-radius: 44px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: content-box; background: #000; }
  .iphone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 28px; background: #111; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 10; }
  .iphone-content { width: 100%; height: 100%; overflow-y: auto; background: #fff; border-radius: 30px; scrollbar-width: none; position: relative; }
  .iphone-content::-webkit-scrollbar { display: none; }
  .iphone-content img { width: 100%; display: block; height: auto; }
</style>

<div class="layout-wrapper">
  <div class="data-column">
    <div style="padding: 1rem 0;">
      <div class="tabs" id="tabs"></div>
      <div class="persona-meta" id="meta"></div>
      <div id="top-adjectives" class="top-adjectives"></div>
      <div id="chart-area"></div>
    </div>
  </div>
  <div class="phone-column">
    <div class="iphone-frame">
      <div class="iphone-notch"></div>
      <div class="iphone-content">
        <img id="persona-img" src="persona_0.png" alt="Persona Design">
      </div>
    </div>
  </div>
</div>

<script>
const personas = [
  { name: "Broadcaster",          key: 1, color: "#378ADD", bg: "#E6F1FB", textColor: "#185FA5" },
  { name: "Product Reviewer",     key: 2, color: "#7F77DD", bg: "#EEEDFE", textColor: "#534AB7" },
  { name: "Trend Enthusiast",     key: 3, color: "#BA7517", bg: "#FAEEDA", textColor: "#854F0B" },
  { name: "Authentic Storyteller", key: 0, color: "#D85A30", bg: "#FAECE7", textColor: "#993C1D" },
  { name: "Visual Curator",       key: 4, color: "#1D9E75", bg: "#E1F5EE", textColor: "#0F6E56" },
];

const data = [
  ["Alive",          2,  15,  1,  8, 71],
  ["Attractive",     5,  22,  4, 15, 76],
  ["Cheap",         12,  38, 25, 18,  2],
  ["Childish",       4,  38, 12,  9,  1],
  ["Corporate",     78,  29, 88, 54,  4],
  ["Creative",       8,  51,  5, 12, 45],
  ["Crypto-bro",    41,   5, 18, 61,  8],
  ["Dynamic",        3,  18,  2, 11, 82],
  ["Effortless",    22,  14, 15, 10, 35],
  ["Exclusive",      6,   8,  8, 22, 89],
  ["Expressive",     4,  51,  3,  7, 52],
  ["Flat",          65,  21, 72, 40,  1],
  ["Fluid",          2,  12,  1,  5, 82],
  ["Generic",       78,  29, 88, 54,  3],
  ["Immersive",      1,  10,  2,  6, 71],
  ["Minimalist",    22,  19, 15, 14, 28],
  ["Modern",        15,  64, 10, 42, 60],
  ["Premium",       10,  12,  9, 25, 89],
  ["Scammy",        18,   7, 45, 12,  5],
  ["Sexy",           1,   9,  1,  8, 76],
  ["Static",        65,  18, 72, 40,  2],
  ["Techy",         41,  11, 22, 61, 12],
  ["Trendy",         9,  64,  8, 42, 58],
  ["Untrustworthy", 14,   6, 45, 15,  3],
];

let activePersona = 0;
let sortMode = "pct";

function setSort(mode) {
  sortMode = mode;
  document.getElementById("sort-pct").className = "sort-btn" + (mode === "pct" ? " active" : "");
  document.getElementById("sort-alpha").className = "sort-btn" + (mode === "alpha" ? " active" : "");
  render();
}

function render() {
  const p = personas[activePersona];
  const col = p.key;

  let rows = data.map(r => ({ label: r[0], val: r[col + 1] }));
  const sortedByPct = [...rows].sort((a, b) => b.val - a.val);
  
  if (sortMode === "pct") rows = [...sortedByPct];
  else rows.sort((a, b) => a.label.localeCompare(b.label));

  const vals = rows.map(r => r.val);
  const avg = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  const top = sortedByPct[0];
  const topFive = sortedByPct.slice(0, 5);

  document.getElementById("meta").innerHTML = `
    <div class="meta-card">
      <div class="meta-label">Strongest trait</div>
      <div class="meta-val" style="font-size:15px;padding-top:3px;color:${p.textColor}">${top.label} ${top.val}%</div>
    </div>
  `;

  document.getElementById("top-adjectives").innerHTML = `
    <span class="top-adjectives-label">Top 5:</span>
    ${topFive.map(r => `<span class="top-adj-tag" style="background:${p.bg};color:${p.textColor};border-color:${p.color};">${r.label}</span>`).join("")}
  `;

  document.getElementById("chart-area").innerHTML = rows.map(r => `
    <div class="bar-row">
      <div class="bar-label">${r.label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${r.val}%;background:${p.color};"></div>
      </div>
      <div class="bar-pct" style="color:${p.textColor}">${r.val}%</div>
    </div>
  `).join("");
  document.getElementById("persona-img").src = `persona_${p.key}.png`;
}

function buildTabs() {
  document.getElementById("tabs").innerHTML = personas.map((p, i) => `
    <button class="tab${i === activePersona ? " active" : ""}" 
      onclick="switchTab(${i})"
      style="${i === activePersona ? `background:${p.bg};color:${p.textColor};border-color:${p.color};` : ""}">
      ${p.name}
    </button>
  `).join("");
}

function switchTab(i) {
  activePersona = i;
  buildTabs();
  render();
}

buildTabs();
render();
</script>
